# SRL GRPO training config for Qwen2.5-7B-Instruct

model: Qwen/Qwen2.5-3B-Instruct
data: data/srl_train.jsonl
val_data: data/srl_val.jsonl
output_dir: checkpoints/srl/step_500

max_train_samples: 250
max_eval_samples: 60
batch_size: 4
group_size: 4
num_train_epochs: 2
num_generations: 4

max_new_tokens: 4096
temperature: 1.0

lr: 1.0e-6
clip_epsilon: 0.2
eps_std: 0.01
kl_coef: 0.0

checkpoint_every: 5
eval_every: 50
seed: 42
